[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
pythonpath = .

# Markers pour séparer les types de tests
markers =
    unit: Tests unitaires (sans dépendances externes)
    integration: Tests d'intégration (nécessitent Docker)
    smoke: Tests smoke end-to-end (nécessitent la stack Docker complète)