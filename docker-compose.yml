services:
# ══════════════════════════════════════════════════════════
# SGBD
# ══════════════════════════════════════════════════════════
  postgres-user:
    image: postgres:16-alpine
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_USER_DB}
      POSTGRES_USER: ${POSTGRES_USER_USER}
      POSTGRES_PASSWORD: ${POSTGRES_USER_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - pgdata-user:/var/lib/postgresql/data   # données persistantes
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER_USER} -d ${POSTGRES_USER_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - nutriplanner

  postgres-recipe:
    image: postgres:16-alpine
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_RECIPE_DB}
      POSTGRES_USER: ${POSTGRES_RECIPE_USER}
      POSTGRES_PASSWORD: ${POSTGRES_RECIPE_PASSWORD}
    ports:
      - "5434:5432"
    volumes:
      - pgdata-recipe:/var/lib/postgresql/data   # données persistantes
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_RECIPE_USER} -d ${POSTGRES_RECIPE_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - nutriplanner

  postgres-menu:
    image: postgres:16-alpine
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_MENU_DB}
      POSTGRES_USER: ${POSTGRES_MENU_USER}
      POSTGRES_PASSWORD: ${POSTGRES_MENU_PASSWORD}
    ports:
      - "5435:5432"
    volumes:
      - pgdata-menu:/var/lib/postgresql/data   # données persistantes
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_MENU_USER} -d ${POSTGRES_MENU_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - nutriplanner
  
  postgres-crawler:
    image: postgres:16-alpine
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_CRAWLER_DB}
      POSTGRES_USER: ${POSTGRES_CRAWLER_USER}
      POSTGRES_PASSWORD: ${POSTGRES_CRAWLER_PASSWORD}
    ports:
      - "5436:5432"
    volumes:
      - pgdata-crawler:/var/lib/postgresql/data   # données persistantes
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_CRAWLER_USER} -d ${POSTGRES_CRAWLER_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - nutriplanner
  
  postgres-notification:
    image: postgres:16-alpine
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_NOTIFICATION_DB}
      POSTGRES_USER: ${POSTGRES_NOTIFICATION_USER}
      POSTGRES_PASSWORD: ${POSTGRES_NOTIFICATION_PASSWORD}
    ports:
      - "5437:5432"
    volumes:
      - pgdata-notification:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_NOTIFICATION_USER} -d ${POSTGRES_NOTIFICATION_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - nutriplanner

# ══════════════════════════════════════════════════════════
# SERVICE — user
# ══════════════════════════════════════════════════════════
  service-user:
    build:
      context: ./service-user
    container_name: nutriplanner-service-user
    ports:
      - "8001:8000"
    volumes:
      - ./service-user:/app
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER_USER}:${POSTGRES_USER_PASSWORD}@postgres-user:5432/${POSTGRES_USER_DB}
    env_file:
      - .env
      - ./service-user/conf/.env
    depends_on:
      postgres-user:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 20s
    networks:
      - nutriplanner

# ══════════════════════════════════════════════════════════
# SERVICE — Recipe linked to postgre
# ══════════════════════════════════════════════════════════
  service-recipe:
    build:
      context: ./service-recipe
    container_name: nutriplanner-service-recipe
    ports:
      - "8002:8000"
    volumes:
      - ./service-recipe:/app
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_RECIPE_USER}:${POSTGRES_RECIPE_PASSWORD}@postgres-recipe:5432/${POSTGRES_RECIPE_DB}
      - SERVICE_USER_URL=http://service-user:8000
    env_file:
      - .env
      - ./service-recipe/conf/.env
    depends_on:
      postgres-recipe:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      service-user:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 20s
    networks:
      - nutriplanner

# ══════════════════════════════════════════════════════════
# SERVICE — Menu linked to postgre
# ══════════════════════════════════════════════════════════
  service-menu:
    build:
      context: ./service-menu
    container_name: nutriplanner-service-menu
    ports:
      - "8003:8000"
    volumes:
      - ./service-menu:/app
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_MENU_USER}:${POSTGRES_MENU_PASSWORD}@postgres-menu:5432/${POSTGRES_MENU_DB}
      - SERVICE_USER_URL=http://service-user:8000
      - SERVICE_RECIPE_URL=http://service-recipe:8000
    env_file:
      - .env
      - ./service-menu/conf/.env
    depends_on:
      postgres-menu:
        condition: service_healthy
      service-user:
        condition: service_healthy
      service-recipe:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks:
      - nutriplanner
  
# ══════════════════════════════════════════════════════════
# SERVICE — crawler linked to postgre
# ══════════════════════════════════════════════════════════
  service-crawler:
    build:
      context: ./service-crawler
    container_name: nutriplanner-service-crawler
    ports:
      - "8004:8000"
    volumes:
      - ./service-crawler:/app
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_CRAWLER_USER}:${POSTGRES_CRAWLER_PASSWORD}@postgres-crawler:5432/${POSTGRES_CRAWLER_DB}
    env_file:
      - .env
      - ./service-crawler/conf/.env
    depends_on:
      postgres-crawler:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks:
      - nutriplanner

# ══════════════════════════════════════════════════════════
# SERVICE — notification linked to postgre
# ══════════════════════════════════════════════════════════
  service-notification:
    build:
      context: ./service-notification
    container_name: nutriplanner-service-notification
    ports:
      - "8006:8000"
    volumes:
      - ./service-notification:/app
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_NOTIFICATION_USER}:${POSTGRES_NOTIFICATION_PASSWORD}@postgres-notification:5432/${POSTGRES_NOTIFICATION_DB}
    env_file:
      - .env
      - ./service-notification/conf/.env
    depends_on:
      postgres-notification:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 20s
    networks:
      - nutriplanner

# ══════════════════════════════════════════════════════════
# SEARCH ENGINE
# ══════════════════════════════════════════════════════════
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: nutriplanner-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    mem_limit: 1g
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - nutriplanner
  
  redis:
    image: redis:7-alpine
    container_name: nutriplanner-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    mem_limit: 64m
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - nutriplanner
# ══════════════════════════════════════════════════════════
# ASYNC SCHEDULER — Celery Beat
# ══════════════════════════════════════════════════════════
  celery-beat:
    build:
      context: ./service-crawler
    container_name: nutriplanner-celery-beat
    command: celery -A celery_app beat --loglevel=info
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_CRAWLER_USER}:${POSTGRES_CRAWLER_PASSWORD}@postgres-crawler:5432/${POSTGRES_CRAWLER_DB}
      - CELERY_BROKER_URL=redis://redis:6379/0
    env_file:
      - .env
      - ./service-crawler/conf/.env
    mem_limit: 128m
    depends_on:
      redis:
        condition: service_healthy
      postgres-crawler:
        condition: service_healthy
      service-crawler:
        condition: service_started
    networks:
      - nutriplanner
# ══════════════════════════════════════════════════════════
# OBJECT STORAGE — MinIO
# ══════════════════════════════════════════════════════════
  minio:
    image: minio/minio:latest
    container_name: nutriplanner-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"   # API S3 (utilisée par le code Python)
      - "9001:9001"   # Console web d'administration
    volumes:
      - minio-data:/data
    mem_limit: 256m
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nutriplanner

networks:
  nutriplanner:
    driver: bridge
volumes:
  pgdata-user:
  pgdata-recipe:
  pgdata-menu:
  pgdata-crawler:
  es-data:
  redis-data:
  minio-data:
  pgdata-notification:

