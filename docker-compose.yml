services:
# ══════════════════════════════════════════════════════════
# SGBD
# ══════════════════════════════════════════════════════════
  postgres-user:
    image: postgres:16-alpine
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_USER_DB}
      POSTGRES_USER: ${POSTGRES_USER_USER}
      POSTGRES_PASSWORD: ${POSTGRES_USER_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - pgdata-user:/var/lib/postgresql/data   # données persistantes
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER_USER} -d ${POSTGRES_USER_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - nutriplanner

  postgres-recipe:
    image: postgres:16-alpine
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_RECIPE_DB}
      POSTGRES_USER: ${POSTGRES_RECIPE_USER}
      POSTGRES_PASSWORD: ${POSTGRES_RECIPE_PASSWORD}
    ports:
      - "5434:5432"
    volumes:
      - pgdata-recipe:/var/lib/postgresql/data   # données persistantes
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_RECIPE_USER} -d ${POSTGRES_RECIPE_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - nutriplanner

  postgres-menu:
    image: postgres:16-alpine
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_MENU_DB}
      POSTGRES_USER: ${POSTGRES_MENU_USER}
      POSTGRES_PASSWORD: ${POSTGRES_MENU_PASSWORD}
    ports:
      - "5435:5432"
    volumes:
      - pgdata-menu:/var/lib/postgresql/data   # données persistantes
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_MENU_USER} -d ${POSTGRES_MENU_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - nutriplanner

# ══════════════════════════════════════════════════════════
# SERVICE — user
# ══════════════════════════════════════════════════════════
  service-user:
    build:
      context: ./service-user
    container_name: nutriplanner-service-user
    ports:
      - "8001:8000"
    volumes:
      - ./service-user:/app
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER_USER}:${POSTGRES_USER_PASSWORD}@postgres-user:5432/${POSTGRES_USER_DB}
    env_file:
      - .env
      - ./service-user/conf/.env
    depends_on:
      postgres-user:
        condition: service_healthy
    networks:
      - nutriplanner

# ══════════════════════════════════════════════════════════
# SERVICE — Recipe linked to postgre
# ══════════════════════════════════════════════════════════
  service-recipe:
    build:
      context: ./service-recipe
    container_name: nutriplanner-service-recipe
    ports:
      - "8002:8000"
    volumes:
      - ./service-recipe:/app
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_RECIPE_USER}:${POSTGRES_RECIPE_PASSWORD}@postgres-recipe:5432/${POSTGRES_RECIPE_DB}
      - SERVICE_USER_URL=http://service-user:8000
    env_file:
      - .env
      - ./service-recipe/conf/.env
    depends_on:
      postgres-recipe:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - nutriplanner

# ══════════════════════════════════════════════════════════
# SERVICE — Recipe linked to postgre
# ══════════════════════════════════════════════════════════
  service-menu:
    build:
      context: ./service-menu
    container_name: nutriplanner-service-menu
    ports:
      - "8003:8000"
    volumes:
      - ./service-menu:/app
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_MENU_USER}:${POSTGRES_MENU_PASSWORD}@postgres-menu:5432/${POSTGRES_MENU_DB}
      - SERVICE_USER_URL=http://service-user:8000
      - SERVICE_RECIPE_URL=http://service-recipe:8000
    env_file:
      - .env
      - ./service-menu/conf/.env
    depends_on:
      postgres-menu:
        condition: service_healthy
    networks:
      - nutriplanner

# ══════════════════════════════════════════════════════════
# SEARCH ENGINE
# ══════════════════════════════════════════════════════════
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: nutriplanner-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - nutriplanner

networks:
  nutriplanner:
    driver: bridge
volumes:
  pgdata-user:
  pgdata-recipe:
  pgdata-menu:
  es-data: