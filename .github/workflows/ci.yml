name: Nutri-App CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  
jobs:
  analyze-user:
    if: github.event_name == 'pull_request' || contains(github.event.head_commit.message, 'service-user')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with: { fetch-depth: 0 }
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with: { python-version: '3.12' }

      - name: Install & Test
        run: |
          cd service-user
          pip install -r requirements.txt
          pip install pytest pytest-cov
          pytest --cov=app --cov-report=xml:coverage.xml -m "not smoke"
      
      - name: SonarScan User
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          projectBaseDir: service-user
          args: 
            -Dsonar.organization=sonar-nutri-app
            -Dsonar.projectKey=nutri-app-service-user
            -Dsonar.python.coverage.reportPaths=coverage.xml
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
  analyze-recipe:
    if: github.event_name == 'pull_request' || contains(github.event.head_commit.message, 'service-recipe')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with: { fetch-depth: 0 }
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with: { python-version: '3.12' }

      - name: Install & Test
        run: |
          cd service-recipe
          pip install -r requirements.txt
          pip install pytest pytest-cov
          pytest --cov=app --cov-report=xml:coverage.xml -m "not smoke"
      
      - name: SonarScan Recipe
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          projectBaseDir: service-recipe
          args: 
            -Dsonar.organization=sonar-nutri-app
            -Dsonar.projectKey=nutri-app-service-recipe
            -Dsonar.python.coverage.reportPaths=coverage.xml
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
  analyze-menu:
    if: github.event_name == 'pull_request' || contains(github.event.head_commit.message, 'service-menu')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with: { fetch-depth: 0 }

      - name: Setup Python
        uses: actions/setup-python@v5
        with: { python-version: '3.12' }

      - name: Install & Test
        run: |
          cd service-menu
          pip install -r requirements.txt
          pip install pytest pytest-cov
          pytest --cov=app --cov-report=xml:coverage.xml -m "not smoke"
      
      - name: SonarScan Menu
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          projectBaseDir: service-menu
          args: 
            -Dsonar.organization=sonar-nutri-app
            -Dsonar.projectKey=nutri-app-service-menu
            -Dsonar.python.coverage.reportPaths=coverage.xml
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  analyze-crawler:
    if: github.event_name == 'pull_request' || contains(github.event.head_commit.message, 'service-crawler')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with: { fetch-depth: 0 }

      - name: Setup Python
        uses: actions/setup-python@v5
        with: { python-version: '3.12' }

      - name: Install & Test
        run: |
          cd service-crawler
          pip install -r requirements.txt
          pip install pytest pytest-cov
          pytest --cov=app --cov-report=xml:coverage.xml -m "not smoke"
      
      - name: SonarScan crawler
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          projectBaseDir: service-crawler
          args: 
            -Dsonar.organization=sonar-nutri-app
            -Dsonar.projectKey=nutri-app-service-crawler
            -Dsonar.python.coverage.reportPaths=coverage.xml
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  analyze-notification:
    if: github.event_name == 'pull_request' || contains(github.event.head_commit.message, 'service-notification')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with: { fetch-depth: 0 }

      - name: Setup Python
        uses: actions/setup-python@v5
        with: { python-version: '3.12' }

      - name: Install & Test
        run: |
          cd service-notification
          pip install -r requirements.txt
          pip install pytest pytest-cov
          pytest --cov=app --cov-report=xml:coverage.xml -m "not smoke"
      
      - name: SonarScan notification
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          projectBaseDir: service-notification
          args: 
            -Dsonar.organization=sonar-nutri-app
            -Dsonar.projectKey=nutri-app-service-notification
            -Dsonar.python.coverage.reportPaths=coverage.xml
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


  smoke-tests:
      needs: [analyze-user, analyze-recipe, analyze-menu, analyze-crawler, analyze-notification]
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v5

        - name: Create .env file
          run: |
            echo "POSTGRES_USER_DB=${{ secrets.USER_DB_NAME }}" >> .env
            echo "POSTGRES_USER_USER=${{ secrets.POSTGRES_USER }}" >> .env
            echo "POSTGRES_USER_PASSWORD=${{ secrets.POSTGRES_USER_PASSWORD }}" >> .env

            echo "POSTGRES_RECIPE_DB=${{ secrets.RECIPE_DB_NAME }}" >> .env
            echo "POSTGRES_RECIPE_USER=${{ secrets.POSTGRES_USER }}" >> .env
            echo "POSTGRES_RECIPE_PASSWORD=${{ secrets.POSTGRES_RECIPE_PASSWORD }}" >> .env
            
            echo "POSTGRES_MENU_DB=${{ secrets.MENU_DB_NAME }}" >> .env
            echo "POSTGRES_MENU_USER=${{ secrets.POSTGRES_USER }}" >> .env
            echo "POSTGRES_MENU_PASSWORD=${{ secrets.POSTGRES_MENU_PASSWORD }}" >> .env

            echo "POSTGRES_CRAWLER_DB=${{ secrets.CRAWLER_DB_NAME }}" >> .env
            echo "POSTGRES_CRAWLER_USER=${{ secrets.POSTGRES_CRAWLER }}" >> .env
            echo "POSTGRES_CRAWLER_PASSWORD=${{ secrets.POSTGRES_MENU_CRAWLER }}" >> .env
            
            echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
            echo "ELASTICSEARCH_URL=http://elasticsearch:9200" >> .env
            echo "ELASTICSEARCH_INDEX_RECIPES=recipes" >> .env

            echo "MINIO_ROOT_USER=${{ secrets.MINIO_ROOT_USER }}" >> .env
            echo "MINIO_ROOT_PASSWORD=${{ secrets.MINIO_ROOT_PASSWORD }}" >> .env
            echo "MINIO_ENDPOINT=minio:9000" >> .env
            echo "MINIO_ACCESS_KEY=${{ secrets.MINIO_ACCESS_KEY }}" >> .env
            echo "MINIO_SECRET_KEY=${{ secrets.MINIO_SECRET_KEY }}" >> .env
            echo "MINIO_BUCKET_CRAWLER=crawler-media" >> .env
            echo "MINIO_SECURE=False" >> .env
            echo "SERVICE_RECIPE_URL=http://service-recipe:8000" >> .env
            echo "CELERY_BROKER_URL=redis://redis:6379/0" >> .env
            echo "CELERY_RESULT_BACKEND=redis://redis:6379/1" >> .env

            mkdir -p service-user/conf
            mkdir -p service-recipe/conf
            mkdir -p service-menu/conf
            mkdir -p service-crawler/conf
            mkdir -p service-notification/conf

            cp .env service-user/conf/.env
            cp .env service-recipe/conf/.env
            cp .env service-menu/conf/.env
            cp .env service-crawler/conf/.env
            cp .env service-notification/conf/.env
        
        - name: Verify .env file
          run: |
            echo "=== Root .env ==="
            cat .env
            echo ""
            echo "=== service-user/.env ==="
            cat service-user/conf/.env

        - name: Spin up containers
          run: docker compose up -d || true 
        
        - name: Force check service-user logs
          run: |
            echo "Waiting 20s for service-user to fail..."
            sleep 20
            echo "=== Service User Logs ==="
            docker compose logs service-user --tail=300
            echo ""
            echo "=== Container inspect ==="
            docker inspect nutriplanner-service-user --format='{{.State.Health.Log}}'

        - name: Show container status immediately
          run: |
            echo "=== Container Status ==="
            docker compose ps
            echo ""
            echo "=== Service User Logs ==="
            docker compose logs service-user --tail=100
            echo ""
            echo "=== Service Recipe Logs ==="
            docker compose logs service-recipe --tail=100
            echo ""
            echo "=== Service Menu Logs ==="
            docker compose logs service-menu --tail=100
            echo ""
            echo "=== Service Menu Logs ==="
            docker compose logs service-crawler --tail=100

        - name: Wait for services to be healthy
          run: |
            echo "🔍 Waiting for service-user on localhost:8001..."
            timeout 60 bash -c 'until curl -f http://localhost:8001/health 2>/dev/null; do sleep 2; done'
            
            echo "🔍 Waiting for service-recipe on localhost:8002..."
            timeout 60 bash -c 'until curl -f http://localhost:8002/health 2>/dev/null; do sleep 2; done'
            
            echo "🔍 Waiting for service-menu on localhost:8003..."
            timeout 60 bash -c 'until curl -f http://localhost:8003/health 2>/dev/null; do sleep 2; done'

            echo "🔍 Waiting for service-crawler on localhost:8004..."
            timeout 60 bash -c 'until curl -f http://localhost:8004/health 2>/dev/null; do sleep 2; done'
            
            echo "✅ All services are ready!"

        - name: Show running containers
          run: docker compose ps
        
        - name: Install dependencies for Smoke Tests
          run: |
            pip install httpx pytest

        - name: Run Smoke Tests — service-user
          run: pytest service-user/tests/smoke_test.py --noconftest -m smoke -v

        - name: Run Smoke Tests — service-recipe
          run: pytest service-recipe/tests/smoke_test.py --noconftest -m smoke -v

        - name: Run Smoke Tests — service-menu
          run: pytest service-menu/tests/smoke_test.py --noconftest -m smoke -v

        - name: Run Smoke Tests — service-crawler
          run: pytest service-crawler/tests/smoke_test.py --noconftest -m smoke -v

        - name: Debug - Show service logs on failure
          if: failure()
          run: |
            echo "=== Service User Logs ==="
            docker compose logs service-user
            echo ""
            echo "=== Service Recipe Logs ==="
            docker compose logs service-recipe
            echo ""
            echo "=== Service Menu Logs ==="
            docker compose logs service-menu
            echo ""
            echo "=== Service crawler Logs ==="
            docker compose logs service-crawler